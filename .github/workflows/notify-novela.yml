name: Notify NoveLA Submodule Update

on:
  push:
    branches:
      - main
      - master

jobs:
  notify-parent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger NoveLA repository_dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          repository: AhmadNaruto/NoveLA
          event-type: submodule-updated
