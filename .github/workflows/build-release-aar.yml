name: Build & Release Android AAR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Test Release AAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository & submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android NDK
        uses: nkmrkm/setup-android-ndk@v1
        with:
          ndk-version: '28.2.13676358'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew :android:testDebugUnitTest

      - name: Build Release AAR
        run: ./gradlew :android:assembleRelease

      - name: Upload Release AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luau-android-release-aar
          path: android/build/outputs/aar/*.aar
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/build/outputs/aar/*.aar
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
